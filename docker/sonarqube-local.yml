# =================================================================
# Infraestructura LOCAL de SonarQube — ApexMetrics
# Pila de referencia: PostgreSQL 15  |  SonarQube 10 Community
#
# COMANDOS DE USO:
#   Levantar los servicios:
#     docker compose -f docker/sonarqube-local.yml up -d
#
#   Detener conservando los datos:
#     docker compose -f docker/sonarqube-local.yml down
#
#   Detener y eliminar todos los datos:
#     docker compose -f docker/sonarqube-local.yml down --volumes
#
# NOTAS IMPORTANTES:
#   - Este archivo es INDEPENDIENTE del docker-compose.yml principal.
#     No interfiere con los servicios de la aplicación (frontend,
#     backend ni la base de datos apexmetrics_db).
#   - Primer acceso: http://localhost:9000  →  usuario: admin / clave: admin
#     SonarQube solicitará cambiar la contraseña en el primer inicio de sesión.
#   - Generar el token del proyecto en:
#     Mi Cuenta → Seguridad → Generar Token
# =================================================================

services:

  # ---------------------------------------------------------------
  # Base de datos exclusiva de SonarQube
  # Utiliza PostgreSQL 15 (misma versión mayor que el stack del proyecto)
  # ---------------------------------------------------------------
  sonarqube-db:
    image: postgres:15
    container_name: sonar_postgres
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar          # Credencial de uso exclusivamente local
      POSTGRES_DB: sonarqube
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    networks:
      - sonar_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------
  # Servidor SonarQube Community Edition
  # Espera a que PostgreSQL esté disponible antes de iniciar
  # ---------------------------------------------------------------
  sonarqube:
    image: sonarqube:10-community
    container_name: sonar_server
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar        # Credencial de uso exclusivamente local
    ports:
      - "9000:9000"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs
    networks:
      - sonar_net
    restart: unless-stopped
    # Requerido por el motor Elasticsearch embebido en SonarQube.
    # Sin este límite el contenedor no arranca correctamente.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

# -----------------------------------------------------------------
# Volúmenes nombrados — persisten los datos entre reinicios
# -----------------------------------------------------------------
volumes:
  sonar_db_data:
    name: apexmetrics_sonar_db
  sonar_data:
    name: apexmetrics_sonar_data
  sonar_extensions:
    name: apexmetrics_sonar_extensions
  sonar_logs:
    name: apexmetrics_sonar_logs

# -----------------------------------------------------------------
# Red aislada — no comparte espacio de nombres con la red principal
# -----------------------------------------------------------------
networks:
  sonar_net:
    name: apexmetrics_sonar_net
