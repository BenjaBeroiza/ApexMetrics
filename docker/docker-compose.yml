services:
  frontend:
    build: ../frontend
    ports:
      - '5173:80'
    depends_on:
      - backend

  backend:
    build: ../backend
    ports:
      - '8080:8080'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-apexmetrics_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-apexuser}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-apexpass}
      - JWT_SECRET=${JWT_SECRET:-apexmetrics-dev-secret-change-in-production-min32chars}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-3600000}
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-apexmetrics_db}
      POSTGRES_USER: ${POSTGRES_USER:-apexuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apexpass}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
