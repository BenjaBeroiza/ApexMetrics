sonar.projectKey=apexmetrics-frontend
sonar.projectName=ApexMetrics Frontend
sonar.host.url=http://localhost:9000
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.tsx,**/*.test.ts
sonar.exclusions=**/node_modules/**,**/dist/**,src/main.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/main.tsx,src/App.tsx

sonar.sourceEncoding=UTF-8
