# =================================================================
# Configuración del escáner SonarQube – Frontend ApexMetrics
# Pila tecnológica: React + TypeScript + Vite | Node 20
# =================================================================
#
# IMPORTANTE: el token de autenticación NO va en este archivo.
# Pásalo como variable de entorno antes de ejecutar el escáner:
#
#   PowerShell : $env:SONAR_TOKEN="<tu-token>"
#   Linux/macOS: export SONAR_TOKEN="<tu-token>"
#
# Luego ejecuta:
#   npx sonar-scanner -Dsonar.token=$env:SONAR_TOKEN   (PowerShell)
#   npx sonar-scanner -Dsonar.token=$SONAR_TOKEN        (bash)
#
# =================================================================

# --- Identificación del proyecto ----------------------------------
sonar.projectKey=apexmetrics-frontend
sonar.projectName=ApexMetrics Frontend
sonar.projectVersion=0.0.1-SNAPSHOT

# --- Servidor SonarQube local (desarrollo) -----------------------
# Sobreescribir en integración continua con: -Dsonar.host.url=$SONAR_HOST_URL
sonar.host.url=http://localhost:9000

# --- Directorio fuente y lenguaje --------------------------------
sonar.sources=src
sonar.language=ts

# --- Ruta del reporte de cobertura LCOV --------------------------
# Generado por: npm run test -- --coverage
# Requiere @vitest/coverage-v8 configurado en vite.config.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# --- Exclusiones del análisis ------------------------------------
# Archivos sin lógica testeable: estilos, recursos estáticos, archivos
# de configuración y el punto de entrada .jsx residual (el real es main.tsx)
sonar.exclusions=\
  **/*.css,\
  **/*.md,\
  **/.gitkeep,\
  **/assets/**,\
  **/main.jsx,\
  **/node_modules/**

# --- Exclusiones de cobertura ------------------------------------
# Archivos de arranque y enrutamiento puro — no aportan valor a la métrica
sonar.coverage.exclusions=\
  src/main.tsx,\
  src/App.tsx

# --- Codificación del código fuente ------------------------------
sonar.sourceEncoding=UTF-8
