spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/apexmetrics_db}
    username: ${SPRING_DATASOURCE_USERNAME:apexuser}
    password: ${SPRING_DATASOURCE_PASSWORD:apexpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:apexmetrics-dev-secret-change-in-production-min32chars}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  gemini:
    api-key: ${GEMINI_API_KEY:}

logging:
  level:
    com.apexmetrics: DEBUG
    org.flywaydb: INFO
