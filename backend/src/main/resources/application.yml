spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/apexmetrics_db}
    username: ${SPRING_DATASOURCE_USERNAME:apexuser}
    password: ${SPRING_DATASOURCE_PASSWORD:apexpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:apexmetrics-dev-secret-change-in-production-min32chars}
    expiration-ms: 86400000

logging:
  level:
    com.apexmetrics: DEBUG
